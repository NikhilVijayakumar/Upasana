<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neural Networks - Modules</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@400;500;600&display=swap');

    :root {
      --bg: #faf9f7;
      --surface: #ffffff;
      --surface2: #f4f2ee;
      --border: #e5e0d8;
      --text: #1a1814;
      --text2: #4a4540;
      --text3: #7a7268;
      --accent: #1e5fa8;
      --accent-bg: #edf3fc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Source Serif 4', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      padding: 40px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--border);
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--text3);
      font-size: 1.1rem;
    }

    .nav {
      margin-bottom: 24px;
    }

    .nav a {
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--accent);
      text-decoration: none;
    }

    .nav a:hover {
      text-decoration: underline;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .syllabus-link {
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      text-decoration: none;
      padding: 8px 16px;
      background: var(--accent-bg);
      color: var(--accent);
      border-radius: 4px;
    }

    .syllabus-link:hover {
      opacity: 0.85;
    }

    .module-list {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .module-link {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      text-decoration: none;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }

    .module-link:last-child {
      border-bottom: none;
    }

    .module-link:hover {
      background: var(--surface2);
    }

    .module-title {
      font-size: 1.1rem;
      font-weight: 500;
    }

    .arrow {
      color: var(--text3);
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <a href="../index.html">← Back to Subjects</a>
    </div>

    <header>
      <h1>Neural Networks</h1>
      <p class="subtitle">5 Modules</p>
      <div class="header-actions">
        <a href="ne_syllabus.html" class="syllabus-link">📚 View Syllabus</a>
      </div>
    </header>

    <div class="module-list">
    
    <a href="nn_module1_notes.html" class="module-link">
      <span class="module-title">Module 1</span>
      <span class="arrow">→</span>
    </a>

    <a href="nn_module2_notes.html" class="module-link">
      <span class="module-title">Module 2</span>
      <span class="arrow">→</span>
    </a>

    <a href="nn_module3_notes.html" class="module-link">
      <span class="module-title">Module 3</span>
      <span class="arrow">→</span>
    </a>

    <a href="nn_module4_notes.html" class="module-link">
      <span class="module-title">Module 4</span>
      <span class="arrow">→</span>
    </a>

    <a href="nn_module5_notes.html" class="module-link">
      <span class="module-title">Module 5</span>
      <span class="arrow">→</span>
    </a>

    </div>
  </div>
</body>
</html>
