<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deep Learning Techniques – Modules</title>
  <style>
    
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg:         #f8f7f4;
    --surface:    #ffffff;
    --surface2:   #f2f0ec;
    --border:     #e2ddd6;
    --text:       #18160f;
    --text2:      #4a4640;
    --text3:      #8a8480;
    --accent:     #2b5faa;
    --accent-lt:  #eaf0fb;
    --radius:     8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.75;
    padding: 48px 24px;
  }

  .container { max-width: 840px; margin: 0 auto; }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--accent);
    text-decoration: none;
    margin-bottom: 32px;
  }
  .back-link:hover { text-decoration: underline; }

  header { margin-bottom: 36px; }

  header h1 {
    font-size: 2rem;
    font-weight: 600;
    line-height: 1.25;
    color: var(--text);
    margin-bottom: 6px;
  }

  .subtitle {
    font-family: 'Inter', sans-serif;
    font-size: 0.88rem;
    color: var(--text3);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 6px;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .8; }
  .btn-primary   { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--accent-lt); color: var(--accent); }


    .header-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .module-list {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .module-row {
      display: grid;
      grid-template-columns: 90px 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 18px 24px;
      text-decoration: none;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      transition: background .12s;
    }
    .module-row:last-child { border-bottom: none; }
    .module-row:hover { background: var(--surface2); }

    .mod-num {
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
    }

    .mod-title { font-size: 1rem; font-weight: 400; }

    .mod-arrow { color: var(--text3); font-size: 1.1rem; }
  </style>
</head>
<body>
  <div class="container">
    <a class="back-link" href="../index.html">← All Subjects</a>
    <header>
      <div class="header-row">
        <div>
          <h1>Deep Learning Techniques</h1>
          <p class="subtitle">4 modules</p>
        </div>
        <div style="display:flex;gap:8px;">
          <a class="btn btn-secondary" href="dlt_syllabus.html">Syllabus</a>
        </div>
      </div>
    </header>
    <div class="module-list">
      
    <a class="module-row" href="dlt_module1_notes.html">
      <span class="mod-num">Module 1</span>
      <span class="mod-title">Deep Learning Techniques – Module 1</span>
      <span class="mod-arrow">→</span>
    </a>

    <a class="module-row" href="dlt_module2_notes.html">
      <span class="mod-num">Module 2</span>
      <span class="mod-title">Deep Learning Techniques – Module 2</span>
      <span class="mod-arrow">→</span>
    </a>

    <a class="module-row" href="dlt_module3_notes.html">
      <span class="mod-num">Module 3</span>
      <span class="mod-title">Deep Learning Techniques – Module 3</span>
      <span class="mod-arrow">→</span>
    </a>

    <a class="module-row" href="dlt_module4_notes.html">
      <span class="mod-num">Module 4</span>
      <span class="mod-title">Deep Learning Techniques – Module 4</span>
      <span class="mod-arrow">→</span>
    </a>
    </div>
  </div>
</body>
</html>
