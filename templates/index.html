<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upasana – Subjects</title>
  <style>
    
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg:         #f8f7f4;
    --surface:    #ffffff;
    --surface2:   #f2f0ec;
    --border:     #e2ddd6;
    --text:       #18160f;
    --text2:      #4a4640;
    --text3:      #8a8480;
    --accent:     #2b5faa;
    --accent-lt:  #eaf0fb;
    --radius:     8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.75;
    padding: 48px 24px;
  }

  .container { max-width: 840px; margin: 0 auto; }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--accent);
    text-decoration: none;
    margin-bottom: 32px;
  }
  .back-link:hover { text-decoration: underline; }

  header { margin-bottom: 36px; }

  header h1 {
    font-size: 2rem;
    font-weight: 600;
    line-height: 1.25;
    color: var(--text);
    margin-bottom: 6px;
  }

  .subtitle {
    font-family: 'Inter', sans-serif;
    font-size: 0.88rem;
    color: var(--text3);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 6px;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .8; }
  .btn-primary   { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--accent-lt); color: var(--accent); }


    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .subject-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: box-shadow .15s, transform .15s;
    }
    .subject-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
      transform: translateY(-2px);
    }

    .subject-card h2 { font-size: 1.15rem; font-weight: 600; }

    .meta {
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      color: var(--text3);
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Upasana</h1>
      <p class="subtitle">AI Classroom — select a subject to begin</p>
    </header>
    <div class="grid">
      
    <div class="subject-card">
      <h2>Deep Learning Techniques</h2>
      <p class="meta">4 modules · syllabus available</p>
      <a class="btn btn-primary" href="Deep Learning Techniques/index.html">Open →</a>
    </div>

    <div class="subject-card">
      <h2>NeuralNetworks</h2>
      <p class="meta">5 modules · syllabus available</p>
      <a class="btn btn-primary" href="NeuralNetworks/index.html">Open →</a>
    </div>
    </div>
  </div>
</body>
</html>
